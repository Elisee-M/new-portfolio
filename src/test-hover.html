<!DOCTYPE html>
<html><body><div id="test" style="position:fixed;right:50px;top:50%;width:32px;height:32px;border-radius:50%;border:1px solid white;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer;">H</div>
<script>
const el = document.getElementById('test');
el.addEventListener('mouseenter',()=>{el.style.transform='scale(2.2)';el.style.borderColor='#60a5fa';});
el.addEventListener('mouseleave',()=>{el.style.transform='scale(1)';el.style.borderColor='white';});
</script></body></html>
